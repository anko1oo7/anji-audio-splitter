<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anji Universal Audio Splitter | Pro Edition v2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <!-- Load WaveSurfer.js and Plugins -->
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/timeline.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/hover.min.js"></script>
    <style>
        :root {
            --bg-color: #0d0f14;
            --card-bg: rgba(30, 41, 59, 0.5);
            --accent-pink: #ff2d75;
            --accent-blue: #00d2ff;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-shadow: 0 0 30px rgba(255, 45, 117, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 45, 117, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(0, 210, 255, 0.1) 0%, transparent 40%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 1200px; z-index: 1; }

        header { text-align: center; margin-bottom: 40px; }
        h1 {
            font-size: 3.2rem; font-weight: 600; letter-spacing: -1.5px; margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 45, 117, 0.3));
        }
        p.subtitle { color: var(--text-secondary); font-size: 1.1rem; letter-spacing: 1px; }

        .drop-zone {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 2px dashed var(--glass-border); border-radius: 32px;
            padding: 80px 40px; text-align: center; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; margin-bottom: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .drop-zone:hover { border-color: var(--accent-pink); box-shadow: var(--neon-shadow); transform: scale(1.01); }

        .editor-area {
            display: none; background: var(--card-bg); backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 36px;
            padding: 40px; margin-bottom: 40px; animation: fadeInUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .editor-top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding: 0 15px; flex-wrap: wrap; gap: 20px;
        }
        .time-display {
            font-family: 'JetBrains Mono', monospace; font-size: 1.6rem;
            color: var(--text-primary); letter-spacing: 1px;
            background: rgba(255,255,255,0.05); padding: 10px 25px; border-radius: 20px;
            border: 1px solid var(--glass-border);
        }
        .settings-bar { display: flex; align-items: center; gap: 30px; }
        .setting-item { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; color: var(--text-secondary); font-weight: 600; }
        input[type=number] {
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border);
            color: white; border-radius: 12px; padding: 8px 12px; width: 80px; font-family: inherit; font-size: 1rem;
            outline: none; transition: 0.3s;
        }
        input[type=number]:focus { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }
        
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 10px; height: 6px; width: 140px; outline: none; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; 
            background: var(--accent-blue); cursor: pointer; border: 3px solid #fff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        }

        #waveform-container {
            position: relative; background: rgba(0,0,0,0.4); border-radius: 24px;
            margin-bottom: 30px; overflow: hidden; border: 1px solid var(--glass-border);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }
        #waveform { height: 220px; cursor: crosshair; }
        #timeline { margin-top: -1px; opacity: 0.7; }

        .editor-controls { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .btn {
            background: var(--accent-pink); color: white; border: none; padding: 14px 28px;
            border-radius: 18px; font-weight: 700; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 10px; font-family: inherit; font-size: 0.95rem;
            box-shadow: 0 10px 20px rgba(255, 45, 117, 0.2);
        }
        .btn:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 15px 30px rgba(255, 45, 117, 0.4); }
        .btn:active { transform: translateY(0) scale(0.98); }
        
        .btn.secondary { background: rgba(255,255,255,0.08); color: var(--text-primary); border: 1px solid var(--glass-border); }
        .btn.secondary:hover { background: rgba(255,255,255,0.15); box-shadow: none; border-color: rgba(255,255,255,0.3); }
        
        .btn.special { background: linear-gradient(135deg, var(--accent-blue), #0070ff); box-shadow: 0 10px 20px rgba(0, 112, 255, 0.2); }
        .btn.special:hover { box-shadow: 0 15px 30px rgba(0, 112, 255, 0.4); }
        
        .btn.action-green { background: var(--accent-green); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        .btn.action-green:hover { box-shadow: 0 15px 30px rgba(16, 185, 129, 0.4); }

        .hint-text {
            text-align: center; font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6;
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 16px; border: 1px solid var(--glass-border);
        }

        .results-container { display: none; margin-top: 50px; animation: fadeInUp 0.6s ease-out; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .segment-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px; }
        .segment-card {
            background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 28px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .segment-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--accent-blue);
        }
        .segment-card:hover { 
            transform: translateY(-8px); border-color: var(--accent-blue); 
            background: rgba(255,255,255,0.08); box-shadow: 0 15px 40px rgba(0,210,255,0.15); 
        }
        .seg-name { font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 8px; color: var(--accent-blue); }
        .seg-meta { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 0.9rem; margin-bottom: 20px; }
        .seg-dur { color: var(--accent-green); font-weight: 600; }
        .seg-actions { display: flex; gap: 12px; }
        .action-btn { 
            flex: 1; padding: 14px; border-radius: 14px; border: none; font-weight: 700; 
            cursor: pointer; font-size: 0.9rem; transition: 0.3s; font-family: inherit;
        }
        .p-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); }
        .p-btn:hover { background: rgba(255,255,255,0.2); }
        .d-btn { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); border: 1px solid rgba(16, 185, 129, 0.3); }
        .d-btn:hover { background: var(--accent-green); color: white; }

        #loader {
            display: none; position: fixed; inset: 0; background: rgba(10,10,12,0.96);
            backdrop-filter: blur(20px); z-index: 10000; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { 
            width: 70px; height: 70px; border: 4px solid rgba(255,255,255,0.03); 
            border-top: 4px solid var(--accent-pink); border-right: 4px solid var(--accent-blue);
            border-radius: 50%; animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite; margin-bottom: 25px; 
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Region specific styles hover */
        .wavesurfer-region:hover { opacity: 0.8 !important; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loader-msg" style="font-size: 1.2rem; font-weight: 600; letter-spacing: 2px; color: var(--accent-blue);">INITIALIZING...</p>
    </div>

    <div class="container">
        <header>
            <h1>Universal Audio Splitter</h1>
            <p class="subtitle">AI Creative Workflow Essential Tool</p>
        </header>

        <main>
            <div id="drop-zone" class="drop-zone">
                <span style="font-size: 72px; display: block; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255,45,117,0.5));">🎧</span>
                <p style="font-size: 1.6rem; font-weight: 600; margin-bottom: 10px;">ファイルをドロップして開始</p>
                <p style="color: var(--text-secondary); font-size: 1rem;">WAV, MP3, M4A などのオーディオ形式に対応</p>
                <input type="file" id="file-input" hidden accept="audio/*">
            </div>

            <div id="editor-area" class="editor-area">
                <div class="editor-top-bar">
                    <div class="time-display">
                        <span id="cur-time">00:00.00</span> <span style="color:rgba(255,255,255,0.2); margin: 0 5px;">/</span> <span id="dur-time" style="opacity: 0.5;">00:00.00</span>
                    </div>
                    <div class="settings-bar">
                        <div class="setting-item">
                            <span>分割秒数:</span>
                            <input type="number" id="default-inc" value="15" min="0.1" step="0.5">
                        </div>
                        <div class="setting-item">
                            <span>Zoom:</span>
                            <input type="range" id="zoom-slider" min="10" max="600" value="10">
                        </div>
                    </div>
                </div>

                <div id="waveform-container">
                    <div id="waveform"></div>
                    <div id="timeline"></div>
                </div>
                
                <div class="editor-controls">
                    <button id="play-pause" class="btn secondary">
                        <span id="play-btn-icon" style="font-size: 1.2rem;">▶</span> 再生 / 停止
                    </button>
                    <button id="add-mark" class="btn">
                        <span>➕</span> 範囲を追加
                    </button>
                    <button id="auto-split-all" class="btn action-green">
                        <span>⚡</span> 全て15秒で分割
                    </button>
                    <button id="reset-marks" class="btn secondary">
                        <span>🔄</span> リセット
                    </button>
                    <button id="clear-file" class="btn secondary" style="color: #ff4d4d; border-color: rgba(255, 77, 77, 0.2);">
                        <span>✖</span> 閉じる
                    </button>
                    <button id="finish-btn" class="btn special">
                        <span>✔</span> 切り出し実行
                    </button>
                </div>

                <div class="hint-text">
                    💡 <b>磁石スナップ:</b> 範囲の端を近づけると自動で吸い付きます。<br>
                    <b>ドラッグで移動:</b> 波形上の何もない場所を左右にドラッグして再生位置をシークできます。<br>
                    <b>削除:</b> ピンク/ブルーの領域をダブルクリックすると削除できます。
                </div>
            </div>

            <div id="results-area" class="results-container">
                <div class="results-header">
                    <h2 style="font-size: 1.8rem; font-weight: 600;">切り出しリスト</h2>
                    <button id="dl-all" class="btn action-green">📥 全て保存</button>
                </div>
                <div id="segment-grid" class="segment-grid"></div>
            </div>
        </main>
    </div>

    <script>
        const fileInput = document.getElementById('file-input'), dropZone = document.getElementById('drop-zone');
        const editorArea = document.getElementById('editor-area'), resultsArea = document.getElementById('results-area');
        const segmentGrid = document.getElementById('segment-grid'), loader = document.getElementById('loader'), loaderMsg = document.getElementById('loader-msg');
        const curTimeDisplay = document.getElementById('cur-time'), durTimeDisplay = document.getElementById('dur-time'), zoomSlider = document.getElementById('zoom-slider');
        const defaultIncInput = document.getElementById('default-inc');

        let wavesurfer, wsRegions, originalBuffer = null, baseName = "";
        
        // Configuration
        const SNAP_THRESHOLD = 0.15; // seconds
        const REGion_COLORS = [
            'rgba(255, 45, 117, 0.25)', // Pink
            'rgba(0, 210, 255, 0.25)'   // Blue
        ];

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent-pink)'; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = 'var(--glass-border)'; };
        dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };

        function initWS() {
            if (wavesurfer) wavesurfer.destroy();
            wavesurfer = WaveSurfer.create({
                container: '#waveform',
                waveColor: '#1e293b',
                progressColor: 'rgba(0, 210, 255, 0.3)',
                cursorColor: '#ff2d75',
                cursorWidth: 3,
                height: 220,
                barWidth: 3,
                barGap: 3,
                barRadius: 4,
                normalize: true,
                plugins: [
                    WaveSurfer.Timeline.create({ container: '#timeline', primaryColor: '#475569', secondaryColor: '#334155', fontColor: '#94a3b8' }),
                    WaveSurfer.Hover.create({ lineWidth: 2, labelColor: '#fff', labelBackground: '#ff2d75', labelSize: '11px' })
                ]
            });
            
            wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());
            
            wavesurfer.on('timeupdate', (t) => curTimeDisplay.textContent = formatTime(t));
            wavesurfer.on('ready', () => durTimeDisplay.textContent = formatTime(wavesurfer.getDuration()));
            
            wsRegions.on('region-clicked', (r, e) => {
                e.stopPropagation();
                r.play();
            });
            
            wsRegions.on('region-double-clicked', (r) => r.remove());

            // Magnetic Snapping Logic
            wsRegions.on('region-updated', (region) => {
                const regions = wsRegions.getRegions();
                let snapped = false;

                regions.forEach(other => {
                    if (other === region) return;

                    // Snap START of current region to END of another
                    if (Math.abs(region.start - other.end) < SNAP_THRESHOLD) {
                        region.setOptions({ start: other.end });
                        snapped = true;
                    }
                    // Snap END of current region to START of another
                    if (Math.abs(region.end - other.start) < SNAP_THRESHOLD) {
                        region.setOptions({ end: other.start });
                        snapped = true;
                    }
                });
            });

            // Handle scrubbing (Drag Seek)
            let isDragging = false;
            const waveformEl = document.getElementById('waveform');
            
            waveformEl.addEventListener('pointerdown', (e) => {
                // Check if we are clicking on a region (if so, don't seek)
                if (e.target.closest('.wavesurfer-region')) return;
                isDragging = true;
                seekToMouse(e);
            });

            window.addEventListener('pointermove', (e) => {
                if (isDragging) seekToMouse(e);
            });

            window.addEventListener('pointerup', () => {
                isDragging = false;
            });

            function seekToMouse(e) {
                const rect = waveformEl.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const progress = Math.max(0, Math.min(1, x / rect.width));
                wavesurfer.seekTo(progress);
            }
        }

        async function handleFile(file) {
            if (!file) return;
            loader.style.display = 'flex'; loaderMsg.textContent = "AI ANALYZING AUDIO...";
            baseName = file.name.replace(/\.[^/.]+$/, "");
            initWS();
            try {
                const arrayBuffer = await file.arrayBuffer();
                originalBuffer = await new (window.AudioContext || window.webkitAudioContext)().decodeAudioData(arrayBuffer);
                wavesurfer.loadBlob(file);
                wavesurfer.once('ready', () => {
                    loader.style.display = 'none'; dropZone.style.display = 'none'; editorArea.style.display = 'block';
                    // Default first region
                    addRegionAt(0);
                });
            } catch (e) { 
                console.error(e);
                alert("読み込みに失敗しました。対応していない形式の可能性があります。"); 
                loader.style.display = 'none'; 
            }
        }

        function formatTime(s) {
            const m = Math.floor(s / 60); const sc = (s % 60).toFixed(2);
            return `${m.toString().padStart(2, '0')}:${sc.padStart(5, '0')}`;
        }

        function getNextColor() {
            const count = wsRegions.getRegions().length;
            return REGion_COLORS[count % REGion_COLORS.length];
        }

        function addRegionAt(start) {
            const dur = wavesurfer.getDuration();
            const inc = parseFloat(defaultIncInput.value) || 15;
            wsRegions.addRegion({ 
                start: start, 
                end: Math.min(start + inc, dur), 
                color: getNextColor(), 
                drag: true, 
                resize: true 
            });
        }

        document.getElementById('play-pause').onclick = () => wavesurfer.playPause();
        document.getElementById('reset-marks').onclick = () => wsRegions.clearRegions();
        document.getElementById('add-mark').onclick = () => addRegionAt(wavesurfer.getCurrentTime());
        
        document.getElementById('auto-split-all').onclick = () => {
            wsRegions.clearRegions();
            const dur = wavesurfer.getDuration();
            const inc = parseFloat(defaultIncInput.value) || 15;
            for (let t = 0; t < dur; t += inc) {
                wsRegions.addRegion({
                    start: t,
                    end: Math.min(t + inc, dur),
                    color: REGion_COLORS[Math.floor(t / inc) % REGion_COLORS.length],
                    drag: true,
                    resize: true
                });
            }
        };

        zoomSlider.oninput = (e) => wavesurfer.zoom(Number(e.target.value));
        
        document.getElementById('clear-file').onclick = () => {
            if (confirm("現在のファイルを閉じて初期画面に戻りますか？")) {
                if (wavesurfer) wavesurfer.destroy();
                editorArea.style.display = 'none';
                resultsArea.style.display = 'none';
                dropZone.style.display = 'block';
                originalBuffer = null;
                segmentGrid.innerHTML = '';
            }
        };

        document.getElementById('finish-btn').onclick = async () => {
            const regions = wsRegions.getRegions(); if (!regions.length) return;
            loader.style.display = 'flex'; loaderMsg.textContent = "GENERATING SLICES...";
            segmentGrid.innerHTML = ''; regions.sort((a, b) => a.start - b.start);
            
            // Sequential processing to avoid memory spikes
            for (let i = 0; i < regions.length; i++) {
                const r = regions[i]; 
                const sliced = slice(originalBuffer, r.start, r.end);
                const wav = encode(sliced); 
                const url = URL.createObjectURL(wav);
                const name = `${baseName}_split_${(i + 1).toString().padStart(2, '0')}.wav`;
                addUI(i + 1, r.start, r.end, url, name);
            }
            
            resultsArea.style.display = 'block'; loader.style.display = 'none';
            window.scrollTo({ top: resultsArea.offsetTop - 50, behavior: 'smooth' });
        };

        function slice(src, s, e) {
            const rt = src.sampleRate, sf = Math.round(s * rt), ef = Math.round(e * rt), f = ef - sf;
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const dst = ctx.createBuffer(src.numberOfChannels, f, rt);
            for (let c = 0; c < src.numberOfChannels; c++) {
                dst.copyToChannel(src.getChannelData(c).subarray(sf, ef), c);
            }
            return dst;
        }

        function addUI(id, s, e, url, name) {
            const d = (e - s).toFixed(2);
            const card = document.createElement('div'); card.className = 'segment-card';
            card.innerHTML = `
                <span class="seg-name">Segment #${id.toString().padStart(2, '0')}</span>
                <div class="seg-meta">
                    <span class="seg-time">${formatTime(s)} - ${formatTime(e)}</span>
                    <span class="seg-dur">${d}s</span>
                </div>
                <div class="seg-actions">
                    <button class="action-btn p-btn" onclick="const a = new Audio('${url}'); a.play();">PLAY</button>
                    <button class="action-btn d-btn" onclick="dl('${url}','${name}')">DOWNLOAD</button>
                </div>
            `;
            segmentGrid.appendChild(card);
        }

        window.dl = (u, n) => { const a = document.createElement('a'); a.href = u; a.download = n; a.click(); };
        
        document.getElementById('dl-all').onclick = async () => {
            const btns = segmentGrid.querySelectorAll('.d-btn');
            for (const btn of btns) { 
                btn.click(); 
                await new Promise(r => setTimeout(r, 600)); // Increase delay for browser stability
            }
        };

        function encode(buf) {
            const n = buf.numberOfChannels, len = buf.length * n * 2 + 44, dv = new DataView(new ArrayBuffer(len));
            let p = 0; const u32 = (d) => (dv.setUint32(p, d, true), p += 4), u16 = (d) => (dv.setUint16(p, d, true), p += 2);
            u32(0x46464952); u32(len - 8); u32(0x45564157); u32(0x20746d66); u32(16); u16(1); u16(n);
            u32(buf.sampleRate); u32(buf.sampleRate * 2 * n); u16(n * 2); u16(16); u32(0x61746164); u32(len - p - 4);
            for (let i = 0; i < buf.length; i++) {
                for (let c = 0; c < n; c++) {
                    let s = Math.max(-1, Math.min(1, buf.getChannelData(c)[i]));
                    dv.setInt16(p, s < 0 ? s * 32768 : s * 32767, true); p += 2;
                }
            }
            return new Blob([dv], { type: "audio/wav" });
        }
    </script>
</body>
</html>
