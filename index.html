<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anji Universal Audio Splitter | Pro Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <!-- Load WaveSurfer.js and Plugins -->
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/timeline.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/hover.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-pink: #ff2d75;
            --accent-blue: #00d2ff;
            --accent-green: #2ecc71;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-shadow: 0 0 25px rgba(255, 45, 117, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 45, 117, 0.08) 0%, transparent 35%),
                radial-gradient(circle at 90% 90%, rgba(0, 210, 255, 0.08) 0%, transparent 35%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 1100px; z-index: 1; }

        header { text-align: center; margin-bottom: 30px; }
        h1 {
            font-size: 2.8rem; font-weight: 600; letter-spacing: -1px; margin-bottom: 8px;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        p.subtitle { color: var(--text-secondary); font-size: 1rem; opacity: 0.8; }

        .drop-zone {
            background: var(--card-bg); backdrop-filter: blur(16px);
            border: 2px dashed var(--glass-border); border-radius: 24px;
            padding: 60px 40px; text-align: center; transition: all 0.4s ease;
            cursor: pointer; margin-bottom: 30px;
        }
        .drop-zone:hover { border-color: var(--accent-pink); box-shadow: var(--neon-shadow); }

        .editor-area {
            display: none; background: var(--card-bg); backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 30px; margin-bottom: 30px; animation: fadeInUp 0.5s ease-out;
        }

        .editor-top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 0 10px; flex-wrap: wrap; gap: 15px;
        }
        .time-display {
            font-family: 'JetBrains Mono', monospace; font-size: 1.3rem;
            color: var(--accent-blue); letter-spacing: 1px;
        }
        .settings-bar { display: flex; align-items: center; gap: 20px; }
        .setting-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-secondary); }
        input[type=number] {
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
            color: white; border-radius: 8px; padding: 4px 8px; width: 60px; font-family: inherit;
        }
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 10px; height: 4px; width: 100px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--accent-pink); cursor: pointer; }

        #waveform-container {
            position: relative; background: rgba(0,0,0,0.3); border-radius: 16px;
            margin-bottom: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
        }
        #waveform { height: 180px; cursor: crosshair; }
        #timeline { margin-top: -1px; }

        .editor-controls { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .btn {
            background: var(--accent-pink); color: white; border: none; padding: 12px 24px;
            border-radius: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 8px; font-family: inherit;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 45, 117, 0.4); }
        .btn.secondary { background: rgba(255,255,255,0.1); }
        .btn.secondary:hover { background: rgba(255,255,255,0.15); box-shadow: none; }
        .btn.special { background: linear-gradient(135deg, #00d2ff, #0070ff); }
        .btn.special:hover { box-shadow: 0 8px 25px rgba(0, 112, 255, 0.4); }

        .results-container { display: none; margin-top: 30px; animation: fadeInUp 0.5s ease-out; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .segment-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .segment-card {
            background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 24px; transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .segment-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: var(--accent-blue);
        }
        .segment-card:hover { transform: translateY(-5px); border-color: var(--accent-blue); background: rgba(255,255,255,0.08); box-shadow: 0 10px 30px rgba(0,210,255,0.1); }
        .seg-name { font-weight: 700; font-size: 1rem; display: block; margin-bottom: 6px; }
        .seg-meta { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 0.8rem; margin-bottom: 15px; }
        .seg-time { color: var(--accent-blue); }
        .seg-dur { color: var(--accent-green); font-weight: 600; }
        .seg-actions { display: flex; gap: 10px; }
        .action-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .p-btn { background: rgba(255,255,255,0.1); color: white; }
        .d-btn { background: rgba(46, 204, 113, 0.15); color: var(--accent-green); }

        #loader {
            display: none; position: fixed; inset: 0; background: rgba(10,10,12,0.92);
            backdrop-filter: blur(12px); z-index: 10000; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.05); border-top-color: var(--accent-pink); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loader-msg">読み込み中...</p>
    </div>

    <div class="container">
        <header>
            <h1>Universal Audio Splitter</h1>
            <p class="subtitle">15秒も、1秒も、1分も。自由自在な切り出し体験を。</p>
        </header>

        <main>
            <div id="drop-zone" class="drop-zone">
                <span style="font-size: 56px; display: block; margin-bottom: 15px;">🚀</span>
                <p style="font-size: 1.4rem; font-weight: 600;">ファイルをドロップして開始</p>
                <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px;">またはクリックして選択</p>
                <input type="file" id="file-input" hidden accept="audio/*">
            </div>

            <div id="editor-area" class="editor-area">
                <div class="editor-top-bar">
                    <div class="time-display">
                        <span id="cur-time">00:00.00</span> <span style="color:rgba(255,255,255,0.2)">/</span> <span id="dur-time" style="opacity: 0.5;">00:00.00</span>
                    </div>
                    <div class="settings-bar">
                        <div class="setting-item">
                            <span>デフォルト秒数:</span>
                            <input type="number" id="default-inc" value="15" min="0.1" step="0.5">
                        </div>
                        <div class="setting-item">
                            <span>Zoom:</span>
                            <input type="range" id="zoom-slider" min="10" max="250" value="10">
                        </div>
                    </div>
                </div>

                <div id="waveform-container">
                    <div id="waveform"></div>
                    <div id="timeline"></div>
                </div>
                
                <div class="editor-controls">
                    <button id="play-pause" class="btn secondary">
                        <span id="play-btn-icon">▶</span> 再生 / 停止
                    </button>
                    <button id="add-mark" class="btn">
                        <span>➕</span> 範囲を追加
                    </button>
                    <button id="reset-marks" class="btn secondary">
                        <span>🔄</span> 範囲をリセット
                    </button>
                    <button id="clear-file" class="btn secondary" style="color: #ff4d4d; border: 1px solid rgba(255, 77, 77, 0.3);">
                        <span>✖</span> ファイルを閉じる
                    </button>
                    <button id="finish-btn" class="btn special">
                        <span>✔</span> 切り出し実行
                    </button>
                </div>

                <p style="text-align: center; margin-top: 25px; font-size: 0.85rem; color: var(--text-secondary);">
                    💡 <b>波形上のピンクの領域をドラッグ：</b> 長さを自由に変更できます。<br>
                    ダブルクリックで削除 / 波形クリックで移動
                </p>
            </div>

            <div id="results-area" class="results-container">
                <div class="results-header">
                    <h2>切り出しリスト</h2>
                    <button id="dl-all" class="btn" style="background: var(--accent-green);">一括保存</button>
                </div>
                <div id="segment-grid" class="segment-grid"></div>
            </div>
        </main>
    </div>

    <script>
        const fileInput = document.getElementById('file-input'), dropZone = document.getElementById('drop-zone');
        const editorArea = document.getElementById('editor-area'), resultsArea = document.getElementById('results-area');
        const segmentGrid = document.getElementById('segment-grid'), loader = document.getElementById('loader'), loaderMsg = document.getElementById('loader-msg');
        const curTimeDisplay = document.getElementById('cur-time'), durTimeDisplay = document.getElementById('dur-time'), zoomSlider = document.getElementById('zoom-slider');
        const defaultIncInput = document.getElementById('default-inc');

        let wavesurfer, wsRegions, originalBuffer = null, baseName = "";

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);
        dropZone.ondragover = (e) => (e.preventDefault(), dropZone.classList.add('drag-over'));
        dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
        dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };

        function initWS() {
            if (wavesurfer) wavesurfer.destroy();
            wavesurfer = WaveSurfer.create({
                container: '#waveform', waveColor: '#333', progressColor: 'rgba(255, 45, 117, 0.4)',
                cursorColor: '#00d2ff', cursorWidth: 2, height: 180, barWidth: 2, barGap: 2, normalize: true,
                plugins: [
                    WaveSurfer.Timeline.create({ container: '#timeline', primaryColor: '#666', secondaryColor: '#444' }),
                    WaveSurfer.Hover.create({ lineWidth: 2, labelColor: '#fff', labelBackground: '#ff2d75', labelSize: '10px' })
                ]
            });
            wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());
            wavesurfer.on('timeupdate', (t) => curTimeDisplay.textContent = formatTime(t));
            wavesurfer.on('ready', () => durTimeDisplay.textContent = formatTime(wavesurfer.getDuration()));
            wsRegions.on('region-clicked', (r, e) => (e.stopPropagation(), r.play()));
            wsRegions.on('region-double-clicked', (r) => r.remove());
        }

        async function handleFile(file) {
            if (!file) return;
            loader.style.display = 'flex'; loaderMsg.textContent = "音響データを展開中...";
            baseName = file.name.replace(/\.[^/.]+$/, "");
            initWS();
            try {
                const arrayBuffer = await file.arrayBuffer();
                originalBuffer = await new (window.AudioContext || window.webkitAudioContext)().decodeAudioData(arrayBuffer);
                wavesurfer.loadBlob(file);
                wavesurfer.once('ready', () => {
                    loader.style.display = 'none'; dropZone.style.display = 'none'; editorArea.style.display = 'block';
                    createFirstRegion(wavesurfer.getDuration());
                });
            } catch (e) { alert("読み込みに失敗しました。"); loader.style.display = 'none'; }
        }

        function formatTime(s) {
            const m = Math.floor(s / 60); const sc = (s % 60).toFixed(2);
            return `${m.toString().padStart(2, '0')}:${sc.padStart(5, '0')}`;
        }

        function createFirstRegion(dur) {
            wsRegions.clearRegions();
            const inc = parseFloat(defaultIncInput.value) || 15;
            wsRegions.addRegion({ start: 0, end: Math.min(inc, dur), color: 'rgba(255, 45, 117, 0.2)', drag: true, resize: true });
        }

        document.getElementById('play-pause').onclick = () => wavesurfer.playPause();
        document.getElementById('reset-marks').onclick = () => wsRegions.clearRegions();
        document.getElementById('add-mark').onclick = () => {
            const t = wavesurfer.getCurrentTime(), dur = wavesurfer.getDuration();
            const inc = parseFloat(defaultIncInput.value) || 15;
            wsRegions.addRegion({ start: t, end: Math.min(t + inc, dur), color: 'rgba(255, 45, 117, 0.2)', drag: true, resize: true });
        };
        zoomSlider.oninput = (e) => wavesurfer.zoom(Number(e.target.value));
        document.getElementById('clear-file').onclick = () => {
            if (confirm("現在のファイルを閉じて初期画面に戻りますか？")) {
                if (wavesurfer) wavesurfer.destroy();
                editorArea.style.display = 'none';
                resultsArea.style.display = 'none';
                dropZone.style.display = 'block';
                originalBuffer = null;
                segmentGrid.innerHTML = '';
            }
        };

        document.getElementById('finish-btn').onclick = async () => {
            const regions = wsRegions.getRegions(); if (!regions.length) return;
            loader.style.display = 'flex'; loaderMsg.textContent = "高音質スライスを生成中...";
            segmentGrid.innerHTML = ''; regions.sort((a, b) => a.start - b.start);
            for (let i = 0; i < regions.length; i++) {
                const r = regions[i]; const sliced = slice(originalBuffer, r.start, r.end);
                const wav = encode(sliced); const url = URL.createObjectURL(wav);
                const name = `${baseName}_part${(i + 1).toString().padStart(2, '0')}.wav`;
                addUI(i + 1, r.start, r.end, url, name);
            }
            resultsArea.style.display = 'block'; loader.style.display = 'none';
            window.scrollTo({ top: resultsArea.offsetTop, behavior: 'smooth' });
        };

        function slice(src, s, e) {
            const rt = src.sampleRate, sf = Math.floor(s * rt), ef = Math.floor(e * rt), f = ef - sf;
            const dst = new AudioContext().createBuffer(src.numberOfChannels, f, rt);
            for (let c = 0; c < src.numberOfChannels; c++) dst.copyToChannel(src.getChannelData(c).subarray(sf, ef), c);
            return dst;
        }

        function addUI(id, s, e, url, name) {
            const d = (e - s).toFixed(2);
            const card = document.createElement('div'); card.className = 'segment-card';
            card.innerHTML = `
                <span class="seg-name">Section ${id}</span>
                <div class="seg-meta">
                    <span class="seg-time">${formatTime(s)} - ${formatTime(e)}</span>
                    <span class="seg-dur">${d}s</span>
                </div>
                <div class="seg-actions">
                    <button class="action-btn p-btn" onclick="new Audio('${url}').play()">試聴</button>
                    <button class="action-btn d-btn" onclick="dl('${url}','${name}')">保存</button>
                </div>
            `;
            segmentGrid.appendChild(card);
        }

        window.dl = (u, n) => { const a = document.createElement('a'); a.href = u; a.download = n; a.click(); };
        document.getElementById('dl-all').onclick = async () => {
            for (const btn of segmentGrid.querySelectorAll('.d-btn')) { btn.click(); await new Promise(r => setTimeout(r, 400)); }
        };

        function encode(buf) {
            const n = buf.numberOfChannels, len = buf.length * n * 2 + 44, dv = new DataView(new ArrayBuffer(len));
            let p = 0; const u32 = (d) => (dv.setUint32(p, d, true), p += 4), u16 = (d) => (dv.setUint16(p, d, true), p += 2);
            u32(0x46464952); u32(len - 8); u32(0x45564157); u32(0x20746d66); u32(16); u16(1); u16(n);
            u32(buf.sampleRate); u32(buf.sampleRate * 2 * n); u16(n * 2); u16(16); u32(0x61746164); u32(len - p - 4);
            for (let i = 0; i < buf.length; i++) {
                for (let c = 0; c < n; c++) {
                    let s = Math.max(-1, Math.min(1, buf.getChannelData(c)[i]));
                    dv.setInt16(p, s < 0 ? s * 32768 : s * 32767, true); p += 2;
                }
            }
            return new Blob([dv], { type: "audio/wav" });
        }
    </script>
</body>
</html>
